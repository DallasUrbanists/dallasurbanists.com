---
# this frontmatter section tells Jekyll to process this file, allowing us to use variables like site.tags
---
backend:
  name: git-gateway
  branch: main
  repo: DallasUrbanists/dallasurbanists.com

site_url: https://dallasurbanists.org
logo_url: https://dallasurbanists.org/assets/dallas-urbanists-wordmark.svg
publish_mode: editorial_workflow
media_folder: "assets/cover_images"
search: false

collections:

  - name: "mixers"
    label: "Mixers"
    label_singular: "Mixer"
    folder: "_mixers"
    create: true
    {% raw %}
    summary: "{{date | date('YYYY MMMM D, dddd')}}"
    {% endraw %}
    identifier_field: date
    editor: { preview: false }
    {% raw %}
    slug: "{{year}}-{{month}}-{{day}}-urbanists-mixer"
    {% endraw %}
    fields:
      - {label: "Date", name: "date", widget: "datetime"}
      - {label: "Cover Image", name: "cover", widget: "image", required: false}
      - label: "Location"
        name: "location"
        widget: "object"
        summary: "{{ fields.name }}"
        fields:
          - {label: "Venue/Building/Business", name: "name", widget: "string", default: "Frankie's Downtown", required: true}
          - {label: "Room", name: "room", widget: "string", default: "The Underground", required: true}
          - {label: "Address", name: "address", widget: "string", default: "1303 Main St", required: true}
          - {label: "Neighborhood", name: "neighborhood", widget: "string", default: "Downtown Dallas", required: true}
          - {label: "City", name: "city", widget: "string", default: "Dallas", required: true}
      - {label: "Meetup URL", name: "rsvp_url", widget: "string"}
      - {label: "Slides URL", name: "slides_url", widget: "string", required: false}
      - {label: "Livestream URL", name: "live_url", widget: "string", required: false}
      - {label: "Recording URL", name: "recording_url", widget: "string", required: false}
      - {label: "Notes URL", name: "notes_url", widget: "string", required: false}
      - label: 'Features'
        label_singular: 'Feature'
        summary: '{{ fields.title }}'
        name: 'features'
        widget: 'list'
        allow_add: true
        fields:
          - {label: "Title", name: "title", widget: "string"}
          - {label: "Speaker Name", name: "speaker_name", widget: "string"}
          - {label: "Speaker Org", name: "speaker_org", widget: "string"}
          - {label: "Summary", name: "summary", widget: "text"}
          - {label: "Cover Image", name: "cover", widget: "image"}

  - name: "groups"
    label: "Groups"
    label_singular: "Group"
    folder: "_groups/"
    {% raw %}
    slug: "{{name}}"
    {% endraw %}
    output: true
    create: true
    editor: { preview: false }
    fields:
      - { label: 'Slug', name: 'name', widget: 'string', hint: 'This is used as a unique URL-safe identifier. May only contain lowercase letters, numbers, and dashes (-). For example: "dallas-neighbors-for-housing"' }
      - { label: 'Name', name: 'display_name', widget: 'string', hint: 'This is the name displayed in the majority of cases. If abbreviation is commonly used, this should start with the full name and end with the abbreviation in parenthesis. For example, "Dallas Area Rapid Tranist (DART)"'}
      - { label: 'Alias', name: 'alias', widget: 'string', hint: 'This is the shorthand name. Put just the abbreviation if commonly used (for example, "DART").', required: false }
      - { label: 'Summary', name: 'summary', widget: 'text', required: false, pattern: ['^.{0,500}$', 'Maximum 500 characters.'], hint: 'This is what people see when they are browsing groups in a catalog, so it should be written like an elevator pitch that quickly explains why someone should join and what differentiates the group from others.'}
      - { label: 'Logo', name: 'logo', widget: 'image' }
      - { label: 'Cover Photo', name: 'cover_photo', widget: 'image' }
      - { label: 'Featured?', name: 'is_featured', widget: 'boolean' }
      - { label: 'Focus Issues', name: 'focus_issues', widget: 'string', required: false }
      - { label: 'Focus Area', name: 'focus_area', widget: 'string', required: false }
      - { label: 'Founded On', name: 'founded_on', widget: 'string', required: false }
      - { label: 'Website', name: 'website', widget: 'string' }
      - label: 'Links'
        label_singular: 'Link'
        summary: '{{ fields.label }}'
        name: 'links'
        widget: 'list'
        allow_add: true
        fields:
          - { label: 'Label', name: 'label', widget: 'string' }
          - { label: 'URL', name: 'url', widget: 'string' }
      - { label: 'Body', name: 'body', widget: 'markdown' }

media_library:
  name: uploadcare
  config:
    publicKey: d50f0c9e161743596858
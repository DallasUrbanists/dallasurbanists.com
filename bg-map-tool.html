<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Guides</title>
    <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no">
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.20.0/mapbox-gl.css" rel="stylesheet">
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.20.0/mapbox-gl.js"></script>
    <script id="search-js" defer src="https://api.mapbox.com/search-js/v1.2.0/web.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@turf/turf@7/turf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/lodash@4.17.23/lodash.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
        }

        #map {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 100%;
        }
    </style>
</head>

<body>
    <div id="map"></div>
    <script>
        // Define local constants
        const dallasLngLat = [-96.79874321994009, 32.78097337916814];

        // Configure access to Mapbox GL
        const ACCESS_TOKEN = 'pk.eyJ1IjoiaGV4ZWwtZHVzdCIsImEiOiJjbW1yeWdubXMxZ29vMnJwc3FteDBjZmdkIn0.ex6YdOYvfD1s4kh93TSUxg';
        mapboxgl.accessToken = ACCESS_TOKEN;

        // Import all DART transit stop data
        const transitStops = new Map();
        fetch('./DART/stops.txt').then(async response => {
            const data = await response.text();
            const rows = data.split(/\r?\n/);
            const headers = rows[0].split(',');
            rows.slice(1).forEach(row => {
                const stop = {};
                const cols = row.split(',');
                headers.forEach((header, index) => {
                    stop[header] = cols[index];
                });
                stop.lon = parseFloat(stop.stop_lon);
                stop.lat = parseFloat(stop.stop_lat);
                if (!_.isNaN(stop.lon) && !_.isNaN(stop.lat)) {
                    const point = turf.point([stop.lon, stop.lat], stop);
                    point.id = stop.stop_id;
                    transitStops.set(point.id, point);
                }
            });
            console.log(transitStops);
        });

        // Import all DART transit stop timing data
        const transitTiming = [];
        fetch('./DART/stop_times.txt').then(async response => {
            const data = await response.text();
            const rows = data.split(/\r?\n/);
            const headers = rows[0].split(',');
            rows.slice(1).forEach(row => {
                if (row.trim() === '') {
                    return;
                }
                const rowData = {};
                const cols = row.split(',');
                headers.forEach((header, index) => {
                    rowData[header] = cols[index];
                });
                rowData.stop_sequence = parseInt(rowData.stop_sequence);
                transitTiming.push(rowData);
            });
            console.log(transitTiming);
        });

        // Import all DART transit trip data
        const transitTrips = new Map();
        fetch('./DART/trips.txt').then(async response => {
            const data = await response.text();
            const rows = data.split(/\r?\n/);
            const headers = rows[0].split(',');
            rows.slice(1).forEach(row => {
                if (row.trim() === '') {
                    return;
                }
                const trip = {};
                const cols = row.split(',');
                headers.forEach((header, index) => {
                    trip[header] = cols[index];
                });
                trip.id = trip.trip_id;
                transitTrips.set(trip.id, trip);
            });
            console.log(transitTrips);
        });

        // Import all DART transit route data
        const transitRoutes = new Map();
        fetch('./DART/routes.txt').then(async response => {
            const data = await response.text();
            const rows = data.split(/\r?\n/);
            const headers = rows[0].split(',');
            rows.slice(1).forEach(row => {
                if (row.trim() === '') {
                    return;
                }
                const route = {};
                const cols = row.split(',');
                headers.forEach((header, index) => {
                    route[header] = cols[index];
                });
                route.id = route.route_id;
                transitRoutes.set(route.id, route);
            });
            console.log(transitRoutes);
        });

        // Import all DART transit shape data
        const transitShapes = new Map();
        fetch('./DART/shapes.txt').then(async response => {
            const data = await response.text();
            const rows = data.split(/\r?\n/);
            const headers = rows[0].split(',');
            rows.slice(1).forEach(row => {
                if (row.trim() === '') {
                    return;
                }
                const shapeData = {};
                const cols = row.split(',');
                headers.forEach((header, index) => {
                    shapeData[header] = cols[index];
                });
                const shapeId = shapeData.shape_id;
                if (!transitShapes.has(shapeId)) {
                    transitShapes.set(shapeId, []);
                }
                const shape = transitShapes.get(shapeId);
                shape.push({
                    lat: parseFloat(shapeData.shape_pt_lat),
                    lon: parseFloat(shapeData.shape_pt_lon),
                    seq: parseInt(shapeData.shape_pt_sequence),
                });
            });
            console.log(transitShapes);
        });

        function findTransitStopsNear(lonLat) {
            return Array.from(transitStops.values())
                .filter(stop => {
                    const distance = turf.distance(lonLat, turf.getCoord(stop), { units: 'miles' });
                    const maxDistance = 0.5;
                    stop.distance = distance;
                    return distance <= 0.5;
                })
                .map(stop => {
                    stop.properties.tripIds = new Set();
                    stop.properties.trips = new Set();
                    stop.properties.routes = new Set();
                    stop.properties.headSigns = new Set();
                    stop.properties.timing = transitTiming.filter(t => t.stop_id === stop.id);
                    stop.properties.timing.sort((a, b) => a.stop_sequence - b.stop_sequence);
                    stop.properties.timing.forEach(t => {
                        if (!stop.properties.tripIds.has(t.trip_id)) {
                            const trip = transitTrips.get(t.trip_id);
                            const route = transitRoutes.get(trip.route_id);
                            stop.properties.tripIds.add(t.trip_id);
                            stop.properties.trips.add(trip);
                            stop.properties.routes.add(route);
                            stop.properties.headSigns.add(trip.trip_headsign);
                        }
                    });
                    return stop;
                })
                .toSorted((a, b) => a.distance - b.distance);
        }

        // Define Mapbox GL element
        const map = new mapboxgl.Map({
            container: 'map',
            style: 'mapbox://styles/mapbox/standard', // Use the standard style for the map
            projection: 'globe', // display the map as a globe
            zoom: 13, // initial zoom level, 0 is the world view, higher values zoom in
            center: dallasLngLat, // center the map on this longitude and latitude
            lightPreset: 'night',
        });

        // Define a "main marker" that always points to the main point of interest
        const mainMarker = new mapboxgl.Marker({ color: '#ff0000' }).setLngLat(dallasLngLat);

        // Define an array of "temporary markers"
        const tempMarkers = [];

        // On page load, add stuff to map
        window.addEventListener('load', () => {
            // Define search box component
            const searchBox = new MapboxSearchBox(); // creates a new SearchBox instance
            searchBox.accessToken = ACCESS_TOKEN; // provides your accessToken to Searchbox for requests
            searchBox.options = {
                proximity: dallasLngLat, // Search results biased towards downtown dallas
            };
            searchBox.placeholder = 'Search for places in Dallas';
            searchBox.marker = false; // Adds a marker to the map after clicking a search result
            searchBox.mapboxgl = mapboxgl; // connects
            searchBox.componentOptions = { allowReverse: true, flipCoordinates: true };

            // Listen for location searches using search box component
            searchBox.addEventListener('retrieve', (event) => {
                const searchResult = event.detail; // Access the search result

                // Response depends on whether we have one result or multiple
                if (searchResult.features.length === 1) {
                    const location = searchResult.features[0];
                    const coords = location.geometry.coordinates;

                    // Center the map on the searched location
                    map.flyTo({
                        center: coords,
                        zoom: 14,
                        essential: true // This animation is considered essential with respect to prefers-reduced-motion
                    });

                    // Move main marker to the search location
                    mainMarker.setLngLat(coords);

                    // Look for transit stops near search location
                    const nearbyStops = findTransitStopsNear(coords);
                    const servedHeadsigns = new Set();
                    const servedShapes = new Map();
                    const servedRoutes = new Set();
                    const mainStops = [];
                    nearbyStops.forEach(stop => {
                        const relevantSigns = [];
                        const headSigns = Array.from(stop.properties.headSigns.values());
                        headSigns.forEach(sign => {
                            if (!servedHeadsigns.has(sign)) {
                                relevantSigns.push(sign);
                                servedHeadsigns.add(sign);
                            }
                        });
                        if (relevantSigns.length > 0) {
                            const trips = Array.from(stop.properties.trips.values());
                            const routes = Array.from(stop.properties.routes.values());
                            stop.properties.distanced_served ??= 0;
                            trips.forEach(trip => {
                                const route = routes.find(r => r.id === trip.route_id);
                                if (!servedShapes.has(trip.shape_id)) {
                                    servedShapes.set(trip.shape_id, {
                                        id: trip.shape_id,
                                        stop,
                                        mode: route.route_type,
                                        color: '#' + route.route_color,
                                        headsign: trip.trip_headsign,
                                        points: transitShapes.get(trip.shape_id)
                                    });
                                }
                            });
                            routes.forEach(route => servedRoutes.add(route));
                            mainStops.push(stop);
                            // new mapboxgl.Marker()
                            //     .setLngLat(turf.getCoord(stop))
                            //     .setPopup(new mapboxgl.Popup().setHTML(relevantSigns.join('<br />')))
                            //     .addTo(map);
                        }
                    });

                    // Draw the shape of trips serving the location
                    const nearbyShapes = [];
                    const servedShapesArray = Array.from(servedShapes.values())
                        .filter(s => s.color !== "#FD3E3E")
                        .map(shape => {
                            shape.points.sort((a, b) => a.seq - b.seq);
                            shape.asFeature = turf.lineSlice(
                                [shape.points[0].lon, shape.points[0].lat],
                                turf.getCoord(shape.stop),
                                turf.lineString(shape.points.map(point => [point.lon, point.lat])),
                            );
                            shape.asFeature.properties.color = shape.color;
                            const shapeLength = turf.length(shape.asFeature, { units: 'feet' });
                            shape.stop.properties.distanced_served += shapeLength;
                            return shape;
                        });
                    servedShapesArray.forEach(({ asFeature }) => {
                        nearbyShapes.push(asFeature);
                    });
                    map.getSource('bus_stops').setData(turf.featureCollection(
                        mainStops.filter(stop => stop.properties.distanced_served >= 100)
                    ));

                    const stack = [];
                    const offsetPx = (o) => {
                        if (o % 2 === 0) {
                            return o / 2 * -5;
                        } else {
                            return o * 5;
                        }
                    };
                    for (let i = 0; i < nearbyShapes.length; i++) {
                        const currentShape = nearbyShapes[i];
                        if (i === 0) {
                            currentShape.properties.offset = 0;
                            stack.push(currentShape);
                            continue;
                        }
                        const currentCoords = currentShape.geometry.coordinates;
                        const segments = [];
                        let segmentIndex = 0;
                        let priorOffset = 0;
                        for (let c = 0; c < currentCoords.length; c++) {
                            const thisCoord = currentCoords[c];
                            const measureOffset = (x) => {
                                let offset = 0;
                                for (let s = 0; s < stack.length; s++) {
                                    if (turf.booleanPointOnLine(turf.point(x), stack[s])) {
                                        offset++;
                                    }
                                }
                                return offset;
                            };
                            let currentOffset = measureOffset(thisCoord);
                            if (c === 0) {
                                segmentIndex = 0;
                                segments[segmentIndex] = {
                                    coords: [thisCoord],
                                    offset: offsetPx(currentOffset),
                                    rOffset: currentOffset,
                                };
                            } else {
                                if (currentOffset === priorOffset) {
                                    segments[segmentIndex].coords.push(thisCoord);
                                } else if (currentOffset !== priorOffset) {
                                    const nextCoord = currentCoords[c + 1];
                                    const nextOffset = measureOffset(nextCoord);
                                    if (nextOffset === priorOffset) {
                                        segments[segmentIndex].coords.push(thisCoord);
                                        currentOffset = priorOffset;
                                    } else {
                                        if (currentOffset < priorOffset) {
                                            segmentIndex++;
                                            segments[segmentIndex] = {
                                                coords: [currentCoords[c - 1], thisCoord],
                                                offset: offsetPx(currentOffset),
                                                rOffset: currentOffset,
                                            };
                                        } else {
                                            segments[segmentIndex].coords.push(thisCoord);
                                            segmentIndex++;
                                            segments[segmentIndex] = {
                                                coords: [thisCoord],
                                                offset: offsetPx(currentOffset),
                                                rOffset: currentOffset,
                                            };
                                        }
                                    }
                                }
                            }
                            priorOffset = currentOffset;
                        }
                        segments.forEach(({ coords, offset, rOffset }) => {
                            if (coords.length > 1) {
                                stack.push(turf.lineString(coords, { offset, rOffset, color: currentShape.properties.color }));
                            }
                        });
                    }
                    map.getSource('transit_routes').setData(turf.featureCollection(stack));
                    console.log(stack.map(feature => feature.properties));

                    //map.getSource('transit_routes').setData(splitTest);
                    //console.log(splitTest);
                    // console.log(servedShapes);
                    // console.log(nearbyShapes);

                    /*fetchBusStopsAndStations(coords[1], coords[0]).then(matches => {
                        console.log(matches);
                        const busStops = matches.filter(m => m.type === 'node');
                        const stations = matches.filter(m => m.type === 'way');
                        
                        // Add bus markers to the map
                        busStops.forEach((stop, index) => {
                            // Create a custom marker element
                            const busMarker = document.createElement('div');
                            busMarker.className = 'bus-marker';
                            
                            // Set the background image of the marker
                            busMarker.style.backgroundImage = 'url(./assets/icons/bus_square_icon.png)'; // Replace with your bus icon URL
                            busMarker.style.width = '20px'; // Adjust size as needed
                            busMarker.style.height = '20px'; // Adjust size as needed
                            busMarker.style.backgroundSize = 'cover';
                            //busMarker.style.borderRadius = '50%'; // Optional for rounded edges
                            
                            // Create a new marker
                            new mapboxgl.Marker(busMarker, { anchor: 'center' })
                                .setLngLat([stop.lon, stop.lat])
                                .setPopup(new mapboxgl.Popup().setText(stop.tags.name)) // Optional popup
                                .addTo(map);
                        });

                        console.log(stations);
                        stations.forEach(station => {
                            fetchWayGeometry(station.id).then(geometry => {
                                const polygon = convertGeometryToPolygon(geometry);
                                addPolygonToMap(polygon);
                                console.log(geometry, polygon);
                            });
                        });

                        // For each transit stop, fetch walk directions
                        // const firstMatch = matches[0];
                        // const matchCoords = [firstMatch.lon, firstMatch.lat];
                        // getWalkingDirections(matchCoords, coords).then(route => {
                        //     console.log(route);
                        //     addRouteToMap(route);
                        // });
                    });*/
                }

            });
            map.addControl(searchBox); // Adds searchBox to the Mapbox GL JS control area (top right)
            mainMarker.addTo(map); // Adds the main marker to the map
        });

        // Function to hide labels except street names
        map.on('style.load', () => {
            map.setConfigProperty('basemap', 'showPointOfInterestLabels', false);
            map.setConfigProperty('basemap', 'showPlaceLabels', false);
            map.setConfigProperty('basemap', 'showTransitLabels', false);
            map.setConfigProperty('basemap', 'lightPreset', 'day');

            map.addSource('transit_routes', {
                type: 'geojson',
                data: turf.featureCollection([])
            });

            map.addSource('bus_stops', {
                type: 'geojson',
                data: turf.featureCollection([])
            });

            map.addLayer({
                id: 'transit_routes_casing',
                type: 'line',
                source: 'transit_routes',
                slot: 'top',
                layout: {
                    'line-cap': 'square',
                    'line-join': 'round'
                },
                paint: {
                    'line-emissive-strength': 1,
                    'line-color': '#ffffff',
                    'line-width': 8,
                    'line-opacity': 1,
                    'line-offset': ['get', 'offset'],
                }
            });

            map.addLayer({
                id: 'transit_routes',
                type: 'line',
                source: 'transit_routes',
                slot: 'top',
                layout: {
                    'line-cap': 'square',
                    'line-join': 'round'
                },
                paint: {
                    'line-emissive-strength': 1,
                    'line-color': ['get', 'color'],
                    'line-width': 4,
                    'line-opacity': 1,
                    'line-offset': ['get', 'offset'],
                }
            });

            // Load an image from an external URL.
            map.loadImage(
                './assets/icons/bus_square_icon.png',
                (error, image) => {
                    if (error) throw error;

                    // Add the image to the map style.
                    map.addImage('bus_square_icon', image);

                    // Add a layer to use the image to represent the data.
                    map.addLayer({
                        'id': 'bus_stop_icons',
                        'type': 'symbol',
                        'source': 'bus_stops', // reference the data source
                        'layout': {
                            'icon-image': 'bus_square_icon', // reference the image
                            'icon-size': 1
                        }
                    });
                }
            );
        });

        // Function to query OpenStreetMap Overpass API
        async function fetchBusStopsAndStations(lat, lon) {
            const query = `
                [out:json];
                (
                node["highway"="bus_stop"](around:804, ${lat}, ${lon});
                way["railway"="station"](around:804, ${lat}, ${lon});
                );
                out body;
            `;

            const response = await fetch(`https://overpass-api.de/api/interpreter?data=${encodeURIComponent(query)}`);
            const data = await response.json();
            return data.elements;
        }

        // Function to add markers to the map
        function addMarkers(locations) {
            locations.forEach(location => {
                const marker = new mapboxgl.Marker()
                    .setLngLat([location.lon, location.lat])
                    .setPopup(new mapboxgl.Popup().setText(location.tags.name || 'Unknown'))
                    .addTo(map);
            });
        }

        // Function to get walking directions
        async function getWalkingDirections(startCoord, endCoord) {
            const url = `https://api.mapbox.com/directions/v5/mapbox/walking/${startCoord[0]},${startCoord[1]};${endCoord[0]},${endCoord[1]}?geometries=geojson&access_token=${mapboxgl.accessToken}`;

            const response = await fetch(url);
            const data = await response.json();

            if (data.routes && data.routes.length > 0) {
                return data.routes[0].geometry.coordinates;
            }
            throw new Error('No routes found');
        }

        // Function to add the route to the map
        function addRouteToMap(route) {
            const routeGeoJSON = {
                type: 'Feature',
                properties: {},
                geometry: {
                    type: 'LineString',
                    coordinates: route
                }
            };
        }

        // Function to fetch way geometry from Overpass API
        async function fetchWayGeometry(wayId) {
            const query = `
                [out:json];
                way(${wayId}); 
                out geom;
            `;

            const response = await fetch(`https://overpass-api.de/api/interpreter?data=${encodeURIComponent(query)}`);
            const data = await response.json();

            if (data.elements && data.elements.length > 0) {
                return data.elements[0].geometry;
            }
            throw new Error('No way found with the provided ID');
        }

        // Function to convert the geometry to a format usable in Mapbox
        function convertGeometryToPolygon(geometry) {
            const coordinates = geometry.map(coord => [coord.lon, coord.lat]);
            return {
                type: 'Feature',
                geometry: {
                    type: 'Polygon',
                    coordinates: [coordinates]
                }
            };
        }

        // Function to add the polygon to the map
        function addPolygonToMap(polygon) {
            map.addLayer({
                id: 'polygon',
                type: 'fill',
                source: {
                    type: 'geojson',
                    data: polygon
                },
                layout: {},
                paint: {
                    'fill-color': '#888888',
                    'fill-opacity': 0.6
                }
            });
        }

    </script>

</body>
